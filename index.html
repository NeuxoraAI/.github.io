
<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="C-MED: Consultoría especializada en arquitectura de software médico personalizado. Soluciones digitales de precisión para el sector salud.">
    <meta name="keywords" content="software médico, consultoría digital, salud, inteligencia artificial, México">
    <title>C-MED | Consultoría Médica Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cmed-blue: #0055ff;
            --cmed-indigo: #6366f1;
            --cmed-violet: #8b5cf6;
            --cmed-zinc-950: #09090b;
        }

        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: var(--cmed-zinc-950);
            overflow-x: hidden;
        }
        
        section {
            scroll-margin-top: 80px;
        }

        /* ═══════════════════════════════════════════════════════════════
           ANIMACIONES PREMIUM - APPLE STYLE
        ═══════════════════════════════════════════════════════════════ */
        
        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: 
                opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1), 
                transform 1.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-100px);
            transition: 
                opacity 1.6s cubic-bezier(0.16, 1, 0.3, 1), 
                transform 1.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }
        .reveal-right {
            opacity: 0;
            transform: translateX(100px);
            transition: 
                opacity 1.6s cubic-bezier(0.16, 1, 0.3, 1), 
                transform 1.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }
        .reveal-left.active, .reveal-right.active {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-scale {
            opacity: 0;
            transform: scale(0.9);
            transition: 
                opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), 
                transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-scale.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Staggered Animations */
        .stagger-1 { transition-delay: 100ms; }
        .stagger-2 { transition-delay: 200ms; }
        .stagger-3 { transition-delay: 300ms; }
        .stagger-4 { transition-delay: 400ms; }
        .stagger-5 { transition-delay: 500ms; }

        /* ═══════════════════════════════════════════════════════════════
           EFECTOS DE BOTONES PREMIUM
        ═══════════════════════════════════════════════════════════════ */

        .btn-premium {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .btn-premium::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .btn-premium:hover::before {
            opacity: 1;
        }
        .btn-premium:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 20px 40px -15px rgba(0, 85, 255, 0.35),
                0 0 0 1px rgba(0, 85, 255, 0.1);
        }
        .btn-premium:active {
            transform: translateY(-1px) scale(0.98);
            transition: all 0.1s;
        }

        /* ═══════════════════════════════════════════════════════════════
           GRADIENTES Y EFECTOS DE TEXTO
        ═══════════════════════════════════════════════════════════════ */

        .text-gradient {
            background: linear-gradient(135deg, #0055ff 0%, #6366f1 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-gradient-subtle {
            background: linear-gradient(135deg, #3b82f6 0%, #0055ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ═══════════════════════════════════════════════════════════════
           EFECTOS DE IA LABS
        ═══════════════════════════════════════════════════════════════ */

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cmed-blue), var(--cmed-violet), transparent);
            box-shadow: 
                0 0 20px var(--cmed-blue),
                0 0 40px var(--cmed-violet);
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(0, 85, 255, 0.1), 
                            0 0 40px rgba(99, 102, 241, 0.05);
            }
            50% { 
                box-shadow: 0 0 30px rgba(0, 85, 255, 0.2), 
                            0 0 60px rgba(99, 102, 241, 0.1);
            }
        }
        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float {
            animation: float 6s ease-in-out infinite;
        }

        /* ═══════════════════════════════════════════════════════════════
           GLASSMORPHISM
        ═══════════════════════════════════════════════════════════════ */

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(30px);
            -webkit-backdrop-filter: saturate(180%) blur(30px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .glass-dark {
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        /* ═══════════════════════════════════════════════════════════════
           CARDS PREMIUM
        ═══════════════════════════════════════════════════════════════ */

        .card-hover {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(0, 85, 255, 0.05);
        }

        /* ═══════════════════════════════════════════════════════════════
           SCROLLBAR MINIMALISTA
        ═══════════════════════════════════════════════════════════════ */

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1aa;
        }

        /* ═══════════════════════════════════════════════════════════════
           INPUTS PREMIUM
        ═══════════════════════════════════════════════════════════════ */

        input, textarea {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        input:focus, textarea:focus {
            box-shadow: 
                0 0 0 4px rgba(0, 85, 255, 0.1),
                0 10px 40px -10px rgba(0, 85, 255, 0.15) !important;
            transform: translateY(-2px);
        }

        /* ═══════════════════════════════════════════════════════════════
           ANIMACIONES PERSONALIZADAS
        ═══════════════════════════════════════════════════════════════ */

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        /* Selection Style */
        ::selection {
            background: rgba(0, 85, 255, 0.2);
        }
    </style>
